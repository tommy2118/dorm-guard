# Name of your application. Used to uniquely configure containers.
service: dorm_guard

# Name of the container image. With a provider-native registry the
# `image` is just the short name; the registry.server value prefixes it.
image: dorm_guard

# Deploy to these servers.
#
# TODO: before running `kamal setup` the operator must replace the
# REPLACE-DROPLET-IP placeholder with a real IPv4 or SSH-reachable
# hostname. Grep for `REPLACE-` in this file before every deploy.
servers:
  web:
    - REPLACE-DROPLET-IP
  # job:
  #   hosts:
  #     - REPLACE-DROPLET-IP
  #   cmd: bin/jobs

# Kamal's Thruster proxy terminates TLS via Let's Encrypt for the
# single public hostname. Matches `config.hosts` in production.rb —
# both sides must agree or the cert issuance or host allowlist fails.
# (The shared source of truth per-environment is the DORM_GUARD_HOST
# ENV var that production.rb reads; this YAML value is the Kamal-time
# host, which is static per deploy and does not read from ENV.)
proxy:
  ssl: true
  host: dorm-guard.com

# Where you keep your container images.
#
# TODO: before running `kamal setup` the operator must replace
# REPLACE-DOCR-NAMESPACE with the actual DigitalOcean Container
# Registry namespace (see `doctl registry get`). The `username` for
# DOCR is the DigitalOcean API access token itself (DOCR uses the
# token as both username and password).
registry:
  server: registry.digitalocean.com/REPLACE-DOCR-NAMESPACE
  username:
    - KAMAL_REGISTRY_PASSWORD
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets,
# which sources .env at deploy time).
env:
  secret:
    - RAILS_MASTER_KEY
    - KAMAL_REGISTRY_PASSWORD
    - MAILGUN_SMTP_USER_NAME
    - MAILGUN_SMTP_PASSWORD
    - DORM_GUARD_ALERT_TO
  clear:
    # Public hostname — single source of truth, consumed by config.hosts,
    # config.host_authorization, and config.action_mailer.default_url_options.
    DORM_GUARD_HOST: dorm-guard.com

    # Outbound mailer sender. Must match a verified Mailgun domain.
    DORM_GUARD_MAIL_FROM: dorm-guard@dorm-guard.com

    # Mailgun SMTP endpoint. Override to smtp.eu.mailgun.org for EU accounts.
    MAILGUN_SMTP_ADDRESS: smtp.mailgun.org
    MAILGUN_SMTP_PORT: "587"

    # Run the Solid Queue Supervisor inside the web server's Puma process
    # to do jobs. When you start using multiple servers, split job
    # processing to a dedicated machine (separate Kamal accessory) —
    # doing that is Epic 7 territory.
    SOLID_QUEUE_IN_PUMA: true

    # Pinned to 1 to prevent Solid Queue recurring-scheduler double-fire.
    # Running `plugin :solid_queue` inside Puma under WEB_CONCURRENCY > 1
    # would start the scheduler N times and fire schedule_due_checks N×
    # per minute. The value is enforced here (not just documented in the
    # ADR) because "documented but not enforced" is a fragile control.
    WEB_CONCURRENCY: 1

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for sqlite database files and local
# Active Storage files. The volume is named so day-one backups (a future
# ops epic) can bolt on without code changes.
volumes:
  - "dorm_guard_storage:/rails/storage"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

  # # Build image via remote server (useful for faster amd64 builds on arm64 computers)
  # remote: ssh://docker@docker-builder-server
  #
  # # Pass arguments and secrets to the Docker build process
  # args:
  #   RUBY_VERSION: ruby-4.0.0

# Use a different ssh user than root
# ssh:
#   user: app
