name: "dorm_guard"

services:
  rails-app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
    - ../../dorm_guard:/workspaces/dorm_guard:cached
    # Mount the host's Docker socket so `bin/dc kamal ...` (and any other
    # docker-touching command) can reach the host engine without running a
    # docker daemon inside the devcontainer. On macOS this resolves via
    # Docker Desktop's socket at ~/.docker/run/docker.sock (symlinked by
    # Docker Desktop to /var/run/docker.sock on the host). On Linux it's
    # the host daemon's socket directly.
    - /var/run/docker.sock:/var/run/docker.sock

    ports:
    - "3000:3000"

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Uncomment the next line to use a non-root user for all processes.
    # user: vscode

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  
